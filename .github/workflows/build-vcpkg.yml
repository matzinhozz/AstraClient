name: Build with vcpkg

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'

    paths:
      - .github/workflows/build-vcpkg.yml
      - cmake/**
      - src/**
      - CMakeLists.txt
      - vcpkg.json

  pull_request:
    paths:
      - .github/workflows/build-vcpkg.yml
      - cmake/**
      - src/**
      - CMakeLists.txt
      - vcpkg.json

jobs:
  build-windows:
    name: Windows
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg and build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          if not exist vcpkg git clone https://github.com/microsoft/vcpkg vcpkg
          call vcpkg\bootstrap-vcpkg.bat
          vcpkg\vcpkg.exe install --triplet x64-windows-static-release
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=%GITHUB_WORKSPACE%\vcpkg\scripts\buildsystems\vcpkg.cmake
          cmake --build build --parallel %NUMBER_OF_PROCESSORS%

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: logs-windows-${{ github.sha }}
          path: ${{ github.workspace }}\vcpkg\buildtrees\**\*.log
        if: ${{ failure() }}

      - name: Upload artifact binary
        uses: actions/upload-artifact@v4
        with:
          name: astraclient-windows-${{ github.sha }}
          path: |
            ${{ github.workspace }}\build\AstraClient.exe
            ${{ github.workspace }}\build\*.dll
