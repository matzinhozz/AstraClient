<!-- NPC Trader HTML Template -->

<style>
    .flex { display: flex; }
    .block { display: block; }
    .inlineBlock { display: inline-block; }
    .fullWidth { width: 100%; }

    .fontText { font: verdana-11px-antialised; }
    .fontTitle { font: verdana-11px-rounded; }

    .colorGrey { color: #cccccc; }
    .colorWhite { color: #ffffff; }
    .colorLightGrey { color: #aaaaaa; }
    .colorItemGrey { color: #c0c0c0; }
    .bgDark { background: #222222; }

    .iconBox { width: 40px; height: 40px; flex-shrink: 0; min-width: 40px; --virtual: true}
    .borderGrey { border: 1 #444444; }
    .sunkenBorder { --border-width-top: 1; --border-color-top: #141414; --border-width-left: 1; --border-color-left: #141414; --border-width-bottom: 1; --border-color-bottom: #747474; --border-width-right: 1; --border-color-right: #747474; }
    .panelBase { width: 420px; display: block; margin-left: 15px; }
    .windowBtn { width: 12px; height: 12px; --image-source: /images/ui/miniwindow_buttons; --image-size: 14 14; margin-top: 7px; }

    .modal-message { width: 475px; height: 460px; display: block; --image-source: /images/ui/window_new; --image-border: 6; --image-border-top: 27; }
    .leftPanel {width: 470px; height: 460px; float: left;}
    .rightPanel { width: 295px; height: 428px; margin-top: 27px; margin-left: 10px; float: left;}
    .verticalSep { height: 400px; margin-top: 25px; float: left; margin-left: -10px;}
    .closeButton { --image-clip: 28 0 14 14; margin-right: 10px; }
    .closeButton:hover { --image-clip: 28 14 14 14; }
    .closeButton:active { --image-clip: 28 28 14 14; }
    .bottonOptions { --image-clip: 112 0 14 14; margin-right: 25px; }
    .bottonOptions:hover { --image-clip: 112 14 14 14; }
    .bottonOptions:active { --image-clip: 112 28 14 14; }

    .img { width: 250px; height: 27px; }
    .title { margin-left: 112px; margin-top: 8px; display: block; width: 133px; --text-auto-resize: true; }
    .podium { width: 65px; height: 67px; margin-left: 10px; }
    .creature-display { width: 64px; height: 64px; margin-left: 10px; margin-top: 10px; }

    .panelConsole { margin-top: 100px; --image-border: 4; padding: 1; padding-right: 12; padding-left: 4; padding-top: 4; padding-bottom: 4; height: 258px; --image-source: /images/ui/3pixel_frame_borderimage; }
    .inputConsole { margin-bottom: 10px; display: inline-block; width: 328px; margin-left: 15px; margin-top: 5px; --placeholder: "Type here to chat"; --placeholder-color: #6E706F}
    .bottonChat { display: inline; margin-left: 2px; font: cipsoftFont; }

    .panelBotons {height: 35px; margin-bottom: 39px; --focusable: false; width: 100%; margin-left: 15px;}
    .npc-button { width: 19px; height: 19px; --icon-source: /game_npctrader/assets/images/icons-npcdialog; margin-right: 2px; }

    .tradeHeader { padding: 5px; height: 50px; align-items: center; }
    /* Largura mínima: "Currency:" + nome longo (ex.: Gold Coin) não pode sobrepor o slot do item */
    .currencySection { display: block; min-width: 172px; width: 172px; margin-right: 10px; flex-shrink: 0; }
    .tradeCurrencyName { margin-top: 2px; display: block; }
    .tradeCurrencyIcon { margin-right: 5px; margin-left: 2px; flex-shrink: 0; }
    .tradeTabs { width: 50px; height: 34px; display: block; margin-left: auto; }
    .tradeTab { width: 30px; height: -5px; background-color: #505050; --border-width-top: 1; --border-color-top: #707070; --border-width-left: 1; --border-color-left: #707070; --border-width-bottom: 1; --border-color-bottom: #2a2a2a; --border-width-right: 1; --border-color-right: #2a2a2a; }
    .tradeTab:disabled { background-color: #353535; --border-width-top: 1; --border-color-top: #2a2a2a; --border-width-left: 1; --border-color-left: #2a2a2a; --border-width-bottom: 1; --border-color-bottom: #606060; --border-width-right: 1; --border-color-right: #606060; }

    .tradeListScroll { height: 268; margin: 2 0; background-color: #404040; overflow: scroll; }
    .tradeListItem { height: 48; padding: 4 4; border: 1 transparent; margin-left: 2px; margin-top: 2px; background-color: #3a3a3a; border-bottom: 1 #2f2f2f; }
    .tradeListItem:hover { background-color: #4a4a4a; }
    .tradeListItem:focus { background-color: #555555; border: 1 #888888; }
    .tradeListItemSelected { background-color: #555555; border: 1 #888888; }
    .tradeListItemNoStock { background-color: #303030; opacity: 0.55; }
    .tradeListItemNoStock .tradeItemName,
    .tradeListItemNoStock .tradeItemInfo { color: #666666; }
    .tradeListItemNoStock .item { opacity: 0.35; }
    .itemInfoBlock { display: block; margin-left: 5px; width: 235px; min-width: 235px; }
    .tradeItemName { display: block; width: 235px; min-width: 235px; --text-offset: 0 2; }
    .tradeItemInfo { display: block; width: 235px; min-width: 235px; font: verdana-11px-antialised; color: #999999; }

    .tradeSearchRow { height: 21px; margin: 2px 5px; }
    .tradeSearchInput { margin-left: -5px; --placeholder: "Type to search"; --placeholder-color: #6E706F; width: 100%; display: block; float: left;}
    .tradeSearchClear { --image-source: /game_cyclopedia/images/button_clear_search; float: right; margin-right: 5px; }

    .tradeFooter { height: 80px; padding: 4px; position: relative; }
    .tradeTopRow { padding-right: 50px; height: 14px; }
    #amountScrollBar { width: 130px; }
    .tradePreviewBox { background: #1a1a1a; position: absolute; right: 4px; top: 4px; }
    .tradeBuyButton { width: 29px; height: -15px; position: absolute; right: 2px; bottom: 0px; }
    .tradeRows { margin-top: 2px; padding-right: 50px; }
    .tradeRow { height: 15px; }
    .tradeFooterLabel { width: 58px; min-width: 58px; white-space: nowrap; }
    .tradeFooterValue { width: 90px; text-align: right; }
    .tradeFooterAmountInput { width: 88px; height: 16px; text-align: right; padding-right: 2px; }
</style>


<script type="text">
    self.isTradeOpen = false;
    self.tradeItems = {};
    self.selectedItem = nil;
    self.amount = 1;
    self.totalPrice = 0;
    self.totalWeight = "0.00";
</script>

<html>
<window id="windowTrader" placement="center" *width="self.widthConsole" class="modal-message"
    onescape="self:onCloseNpcTrade()">

    <!-- Left Panel -->
    <div class="leftPanel">
        <img class="img" src="assets/images/blue-golden-flag-banner" placement="top-left" />
        <label class="title" placement="top-left">{{self.creatureName}}</label>
        <img class="podium" src="assets/images/backdrop-npcdialog-podestal" placement="top-left" />
        <uicreature id="creatureOutfit" class="creature-display" placement="top-left"></uicreature>

        <div id="consoleBuffer" inverted-scroll="true" class="panelConsole panelBase" style="overflow: scroll; padding: 4px;" layout="type: verticalBox; align-bottom: true" placement="top-left">
        </div>

        <div id="panelBotons" placement="bottom-left" class="panelBotons">
            <button *for="local buttonData in self.buttons" class="npc-button" *tooltip="buttonData.text"
                *icon-clip="self:getIconClip(buttonData.id)" onclick="self:onConsoleTextClicked(buttonData.text)">
            </button>
        </div>
        <input class="inputConsole" placement="bottom-left"/>
        <button id="chatModeButton" class="bottonChat" onclick="self:toggleChatMode()">{{self.chatMode}}</button>
    </div>

    <div class="verticalSep VerticalSeparator" *visible="self.isTradeOpen"></div>

    <!-- Right Panel (Trade) -->
    <div class="rightPanel" *visible="self.isTradeOpen">
        <div class="tradeHeader flex">
            <div class="currencySection">
                <label class="fontText colorGrey" text="Currency:"></label>
                <label class="tradeCurrencyName fontText colorWhite" text="Gold Coin"></label>
            </div>
            <UIItem class="tradeCurrencyIcon iconBox sunkenBorder" item-id="3031" item-count="1" always-show-count="false" />
            <div class="tradeTabs">
                <button id="tabBuy" class="tradeTab fontTitle" text="Buy" onclick="self:setTradeMode(self.BUY)"></button>
                <button id="tabSell" class="tradeTab fontTitle" style="display:block;margin-top: 5px;" text="Sell" onclick="self:setTradeMode(self.SELL)"></button>
            </div>
        </div>

        <div id="tradeListScroll" class="tradeListScroll borderGrey fullWidth sunkenBorder" layout="type: verticalBox">
            <div *for="local item in self.tradeItems" *for-finished="self:onTradeListRendered()" class="tradeListItem flex fullWidth"
                *trade-item="item"
                *class-tradeListItemNoStock="self.tradeMode == self.SELL and (item.sellQty or 0) == 0"
                onhover="self:onNpcTradeRowHover(item, event.value)"
                onmouserelease="self:onTradeItemMouseRelease(item, self, mousePos, mouseButton)">
                <UIItem class="iconBox item" *item="item.ptr"
                    onhover="self:onNpcTradeRowHover(item, event.value)"
                    onmouserelease="self:onTradeItemMouseRelease(item, self, mousePos, mouseButton)" />
                <div class="itemInfoBlock">
                    <label class="tradeItemName fontText colorItemGrey"
                        *color="(self.tradeMode == self.SELL and (item.sellQty or 0) == 0) and '#777777' or '#ffffff'"
                        *text="self:shortText(item.name, 32)"></label>
                    <label class="tradeItemInfo"
                        *color="(self.tradeMode == self.SELL and (item.sellQty or 0) == 0) and '#707070' or '#ffffff'"
                        *text="self:getItemInfoText(item)"></label>
                </div>
            </div>
        </div>

        <div class="tradeSearchRow borderGrey bgDark">
            <input class="tradeSearchInput fontText colorLightGrey" onchange="self:filterTradeList(event.value)"/>
            <uibutton class="tradeSearchClear" onclick="self:clearSearch()"></uibutton>
        </div>

        <div id="tradeFooter" class="tradeFooter">
            <div class="tradeTopRow">
                <HorizontalScrollBar id="amountScrollBar" minimum="1" maximum="50" step="1"
                    onchange="self:onAmountScrollBarChange(event.value)" disabled />
            </div>

            <UIItem id="tradePreview" class="tradePreviewBox item borderGrey iconBox sunkenBorder" />

            <button id="toggleButton" class="tradeBuyButton fontTitle" text="Buy" onclick="self:executeTrade()"></button>

            <div class="tradeRows">
                <div class="tradeRow">
                    <div class="tradeFooterLabel fontText colorGrey inlineBlock">Amount:</div>
                    <input id="tradeAmountInput" class="tradeFooterAmountInput fontText colorWhite bgDark borderGrey inlineBlock" text="1"
                        onchange="self:onAmountInputChange(event)"
                        onclick="self:onTradeAmountInputFocus(target)"
                        onfocus="self:onTradeAmountInputFocus(target)"/>
                </div>
                <div class="tradeRow">
                    <div class="tradeFooterLabel fontText colorGrey inlineBlock">Price:</div>
                    <div id="totalPriceDisplay" class="tradeFooterValue tradeTotalPriceDisplay fontText colorWhite inlineBlock">{{self:getTotalPriceText()}}</div>
                </div>
                <div class="tradeRow">
                    <div class="tradeFooterLabel fontText colorGrey inlineBlock">Gold:</div>
                    <div id="playerGoldDisplay" class="tradeFooterValue fontText colorWhite inlineBlock">{{self:getPlayerGoldText()}}</div>
                </div>
                <div class="tradeRow" *visible="self:hasCustomCurrency()">
                    <div class="tradeFooterLabel fontText colorGrey inlineBlock">Currency:</div>
                    <div id="playerCurrencyDisplay" class="tradeFooterValue fontText colorWhite inlineBlock">{{self:getPlayerCurrencyText()}}</div>
                </div>
            </div>
        </div>
    </div>

    <UIButton class="bottonOptions windowBtn" placement="top-right" *visible="self.isTradeOpen" onclick="self:onOptionsClick()"></UIButton>
    <UIButton class="closeButton windowBtn" placement="top-right" onclick="self:onCloseNpcTrade()"></UIButton>

</window>

</html>
